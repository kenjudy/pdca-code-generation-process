name: Test PDCA Skill Build

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: uv sync --extra test
        working-directory: claude-skill

      - name: Build and test
        run: bash claude-skill/run-tests.sh
