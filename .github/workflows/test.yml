name: Test PDCA Skill Build

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra test --extra lint
        working-directory: claude-skill

      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: claude-skill

      - name: Type check (mypy)
        run: uv run mypy eval tests
        working-directory: claude-skill

      - name: Build and test
        run: bash claude-skill/run-tests.sh
